<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDX-WHV Weather Station</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #ffffff;
            margin: 0;
            padding: 20px 30px;
            color: #222;
        }

        h1 { font-size: 22px; font-weight: bold; margin-bottom: 4px; }
        .subtitle { font-size: 13px; color: #888; margin-bottom: 25px; }

        .cards {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1 1 140px;
            border: 1px solid #e0e0e0;
            padding: 16px;
        }

        .card .label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card .value {
            font-size: 26px;
            font-weight: bold;
            margin-top: 6px;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            font-size: 12px;
            color: #666;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            display: inline-block;
        }

        .legend-dot.red { background: #d94f3b; }
        .legend-dot.blue { background: #3b7dd9; }
        .legend-dot.green { background: #2ea043; }

        .filters {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filters label { font-size: 12px; color: #666; }

        .filters input, .filters select {
            font-size: 13px;
            padding: 6px 10px;
            border: 1px solid #ddd;
            outline: none;
        }

        .filters button {
            font-size: 13px;
            padding: 6px 16px;
            border: 1px solid #222;
            background: #222;
            color: #fff;
            cursor: pointer;
        }

        .filters button.reset {
            background: #fff;
            color: #666;
            border: 1px solid #ddd;
        }

        h2 {
            font-size: 15px;
            font-weight: bold;
            margin: 25px 0 10px 0;
            padding-bottom: 6px;
            border-bottom: 1px solid #eee;
        }

        .table-scroll {
            max-height: 420px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            padding: 8px 12px;
            border-bottom: 2px solid #222;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #555;
            position: sticky;
            top: 0;
            background: #fff;
        }

        td {
            padding: 8px 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        tr:hover { background: #fafafa; }

        .val-high { color: #d94f3b; font-weight: bold; }
        .val-low { color: #3b7dd9; font-weight: bold; }
        .val-ok { color: #2ea043; }

        .chart-section {
            border: 1px solid #e0e0e0;
            padding: 16px;
            margin-bottom: 14px;
        }

        .chart-section h3 {
            font-size: 13px;
            font-weight: bold;
            margin: 0 0 10px 0;
            color: #444;
        }

        .chart-container { height: 220px; }

        .error { color: #d94f3b; }

        @media (max-width: 600px) {
            body { padding: 15px; }
        }
    </style>
</head>
<body>

<h1>BDX-WHV Weather Station</h1>
<p class="subtitle">Citizen Science — Environmental Sensor Network</p>

<div class="cards" id="cards-container"></div>

<div class="legend">
    <div class="legend-item"><span class="legend-dot red"></span> Above recommended range</div>
    <div class="legend-item"><span class="legend-dot blue"></span> Below recommended range</div>
    <div class="legend-item"><span class="legend-dot green"></span> Within recommended range</div>
</div>

<div class="filters">
    <label>Sensor:</label>
    <select id="sensor-filter"><option value="all">All</option></select>
    <label>From:</label>
    <input type="date" id="date-start">
    <label>To:</label>
    <input type="date" id="date-end">
    <button onclick="loadData()">Apply</button>
    <button class="reset" onclick="resetFilters()">Reset</button>
</div>

<h2>Recent Readings</h2>
<div class="table-scroll">
    <table>
        <thead id="table-head"><tr><th>Loading...</th></tr></thead>
        <tbody id="table-body"><tr><td>Loading...</td></tr></tbody>
    </table>
</div>

<h2>Charts</h2>
<div id="charts-container"></div>

<script>
var API = "http://localhost:5001/api";

var SENSOR_CONFIG = {
    "temperature": { color: "#d94f3b", unit: "°C", min: 0, max: 40 },
    "humidity":    { color: "#3b7dd9", unit: "%",  min: 30, max: 60 },
    "pressure":    { color: "#7b3bd9", unit: "hPa", min: -100000, max:100000 },
    "pm2.5":       { color: "#d98f3b", unit: "µg/m³", max: 25 },
    "pm25":        { color: "#d98f3b", unit: "µg/m³", max: 25 },
    "pm10":        { color: "#3bbf5e", unit: "µg/m³", max: 40 },
};

var DEFAULT_COLORS = ["#e6554a", "#4a90d9", "#8e44ad", "#e67e22", "#27ae60", "#c0392b", "#2980b9", "#f39c12"];

function getConfig(key) {
    var lower = key.toLowerCase();
    if (SENSOR_CONFIG[lower]) return SENSOR_CONFIG[lower];
    var idx = sensorKeys.indexOf(key) % DEFAULT_COLORS.length;
    return { color: DEFAULT_COLORS[idx], unit: "" };
}

function safe(val) {
    if (val === null || val === undefined) return "--";
    return Number(val).toFixed(1);
}

function getColorClass(key, val) {
    if (val === null || val === undefined) return "";
    var cfg = getConfig(key);
    if (cfg.max !== undefined && val > cfg.max) return "val-high";
    if (cfg.min !== undefined && val < cfg.min) return "val-low";
    if (cfg.max !== undefined || cfg.min !== undefined) return "val-ok";
    return "";
}

var sensorKeys = [];
var charts = {};

function buildUI(keys) {
    sensorKeys = keys;

    var cardsHtml = "";
    for (var i = 0; i < keys.length; i++) {
        var cfg = getConfig(keys[i]);
        cardsHtml += '<div class="card">' +
            '<div class="label">' + keys[i] + '</div>' +
            '<div class="value" id="cur-' + i + '" style="color:' + cfg.color + '">--</div>' +
            '</div>';
    }
    document.getElementById("cards-container").innerHTML = cardsHtml;

    var select = document.getElementById("sensor-filter");
    select.innerHTML = '<option value="all">All</option>';
    for (var i = 0; i < keys.length; i++) {
        select.innerHTML += '<option value="' + i + '">' + keys[i] + '</option>';
    }

    var headHtml = "<tr><th>Date</th>";
    for (var i = 0; i < keys.length; i++) {
        var cfg = getConfig(keys[i]);
        var header = keys[i];
        if (cfg.unit) header += " (" + cfg.unit + ")";
        headHtml += "<th>" + header + "</th>";
    }
    headHtml += "</tr>";
    document.getElementById("table-head").innerHTML = headHtml;

    var chartsHtml = "";
    for (var i = 0; i < keys.length; i++) {
        var cfg = getConfig(keys[i]);
        var title = keys[i];
        if (cfg.unit) title += " (" + cfg.unit + ")";
        chartsHtml += '<div class="chart-section" id="box-' + i + '">' +
            '<h3>' + title + '</h3>' +
            '<div class="chart-container"><canvas id="chart-' + i + '"></canvas></div>' +
            '</div>';
    }
    document.getElementById("charts-container").innerHTML = chartsHtml;

    charts = {};
    for (var i = 0; i < keys.length; i++) {
        var cfg = getConfig(keys[i]);
        charts[i] = makeChart("chart-" + i, cfg.color);
    }
}

function makeChart(id, color) {
    var ctx = document.getElementById(id).getContext("2d");
    return new Chart(ctx, {
        type: "line",
        data: { labels: [], datasets: [{ data: [], borderColor: color, borderWidth: 1.5, fill: false, pointRadius: 0, tension: 0.3 }] },
        options: {
            plugins: { legend: { display: false } },
            scales: {
                x: { type: "time", time: { unit: "hour" }, grid: { display: false } },
                y: { beginAtZero: false, grid: { color: "#f0f0f0" } }
            }
        }
    });
}

function detectKeys(row) {
    var keys = [];
    for (var k in row) {
        if (k.toLowerCase() !== "date") keys.push(k);
    }
    return keys;
}

var initialized = false;

function loadData() {
    var sensorIdx = document.getElementById("sensor-filter").value;
    var startDate = document.getElementById("date-start").value;
    var endDate = document.getElementById("date-end").value;

    fetch(API + "/weather")
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data.length === 0) return;

            if (!initialized) {
                var keys = detectKeys(data[0]);
                buildUI(keys);
                initialized = true;
            }

            var filtered = data;
            if (startDate) filtered = filtered.filter(function(d) { return d.date >= startDate; });
            if (endDate) filtered = filtered.filter(function(d) { return d.date <= endDate + "-23:59:59"; });

            for (var i = 0; i < sensorKeys.length; i++) {
                var show = (sensorIdx === "all" || sensorIdx === String(i));
                document.getElementById("box-" + i).style.display = show ? "block" : "none";
            }

            var sorted = filtered.slice().reverse();
            var dates = sorted.map(function(d) {
                var fixed = d.date.replace("/", "-").replace("/", "-").replace("-", " ");
                return new Date(fixed);
            });

            for (var i = 0; i < sensorKeys.length; i++) {
                var key = sensorKeys[i];
                charts[i].data.labels = dates;
                charts[i].data.datasets[0].data = sorted.map(function(d) { return d[key]; });
                charts[i].update();
            }

            var tbody = document.getElementById("table-body");
            tbody.innerHTML = filtered.map(function(d) {
                var html = "<tr><td>" + d.date + "</td>";
                for (var i = 0; i < sensorKeys.length; i++) {
                    var key = sensorKeys[i];
                    var val = d[key];
                    var cls = getColorClass(key, val);
                    html += '<td class="' + cls + '">' + safe(val) + '</td>';
                }
                return html + "</tr>";
            }).join("");

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="' + (sensorKeys.length + 1) + '">No data found.</td></tr>';
            }
        })
        .catch(function() {
            document.getElementById("table-body").innerHTML = '<tr><td class="error">Cannot connect to API. Is Flask running?</td></tr>';
        });
}

function loadLatest() {
    fetch(API + "/weather/latest")
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (!initialized) return;
            for (var i = 0; i < sensorKeys.length; i++) {
                var key = sensorKeys[i];
                var cfg = getConfig(key);
                var val = data[key];
                var cls = getColorClass(key, val);
                var el = document.getElementById("cur-" + i);
                var text = safe(val);
                if (cfg.unit) text += " " + cfg.unit;
                el.textContent = text;

                if (cls === "val-high") {
                    el.style.color = "#d94f3b";
                } else if (cls === "val-low") {
                    el.style.color = "#3b7dd9";
                } else if (cls === "val-ok") {
                    el.style.color = "#2ea043";
                } else {
                    el.style.color = cfg.color;
                }
            }
        })
        .catch(function() {});
}

function resetFilters() {
    document.getElementById("date-start").value = "";
    document.getElementById("date-end").value = "";
    document.getElementById("sensor-filter").value = "all";
    loadData();
}

loadData();
setTimeout(loadLatest, 500);
setInterval(function() { loadLatest(); loadData(); }, 30000);
</script>

</body>
</html>
